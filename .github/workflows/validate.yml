name: Validate pack

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-windows:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate PR body control metadata
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: python .\scripts\check-pr-body.py

      - name: Validate manifest and release safety
        shell: pwsh
        run: .\scripts\validate-pack.ps1

      - name: Smoke test install and uninstall
        shell: pwsh
        run: .\tests\install-uninstall-smoke.ps1

      - name: Test transactional install contract
        shell: pwsh
        run: python -B .\tests\test_install_transaction.py

      - name: Test public installer documentation contract
        shell: pwsh
        run: python -B .\tests\test_public_install_docs.py

      - name: Test transactional hard-crash recovery
        shell: pwsh
        run: .\tests\install-transaction-faults.ps1

      - name: Regression test finite case-state engine
        shell: pwsh
        run: python -B .\tests\test_case_state_engine.py

      - name: Smoke test workflow gates
        shell: pwsh
        run: python .\tests\workflow-gates-smoke.py

      - name: Smoke test worktree lanes
        shell: pwsh
        run: python .\tests\worktree-lanes-smoke.py

      - name: Test finite case controls and continuity profiles
        shell: pwsh
        run: |
          python -B .\tests\test_case_state_engine.py
          python -B .\tests\test_source_repository_profile.py
          python -B .\tests\test_validation_evidence.py
          python -B .\tests\test_reentry_summary.py

      - name: Build release package
        shell: pwsh
        run: .\scripts\package.ps1 -OutputPath "$env:RUNNER_TEMP\codex-coding-os.zip"

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: codex-coding-os
          path: ${{ runner.temp }}/codex-coding-os.zip

  validate-bash:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate manifest and release safety
        shell: pwsh
        run: ./scripts/validate-pack.ps1

      - name: Check bash syntax
        shell: bash
        run: bash -n ./scripts/install.sh ./scripts/uninstall.sh ./tests/install-uninstall-smoke.sh

      - name: Test transactional install contract
        shell: bash
        run: python -B ./tests/test_install_transaction.py

      - name: Test public installer documentation contract
        shell: bash
        run: python -B ./tests/test_public_install_docs.py

      - name: Smoke test bash install and uninstall
        shell: bash
        run: bash ./tests/install-uninstall-smoke.sh

      - name: Smoke test workflow gates
        shell: bash
        run: python ./tests/workflow-gates-smoke.py

      - name: Smoke test worktree lanes
        shell: bash
        run: python ./tests/worktree-lanes-smoke.py

      - name: Test finite case controls and continuity profiles
        shell: bash
        run: |
          python -B ./tests/test_case_state_engine.py
          python -B ./tests/test_source_repository_profile.py
          python -B ./tests/test_validation_evidence.py
          python -B ./tests/test_reentry_summary.py
